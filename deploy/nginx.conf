server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip for text-based assets.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml;

    # Long-cache immutable framework and static assets.
    location /_framework/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|wasm)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # WebAssembly MIME type.
    types {
        application/wasm wasm;
    }

    # Serve pretty URLs: try the exact file, then <path>.html, then <path>/index.html.
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }

    # Custom 404 page produced by the static generator.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
