apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiranjoy-web
  namespace: kiranjoy-prod
  labels:
    app: kiranjoy-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kiranjoy-web
  template:
    metadata:
      labels:
        app: kiranjoy-web
    spec:
      containers:
      - name: kiranjoy-web
        # Updated automatically by CI (.github/workflows/ci-deploy.yml)
        image: ghcr.io/kijoyin/kiranjoy-web:a341eb48a5a621b0e7cad238cc1e5088139fc6e5
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
