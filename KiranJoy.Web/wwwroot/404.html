<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Kiran Joy</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/site.css" />
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('theme');
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));
            } catch (e) { }
        })();
    </script>
</head>
<body>
    <div class="page">
        <main class="site-main">
            <div class="container" style="text-align:center; padding-block:5rem;">
                <h1 style="font-size:4rem; margin:0;">404</h1>
                <p class="lead-block" style="margin-inline:auto;">This page wandered off. It may have moved or never existed.</p>
                <p style="margin-top:2rem;">
                    <a class="btn btn-primary" href="/">Back home</a>
                    <a class="btn btn-ghost" href="/blog">Browse the blog</a>
                </p>
            </div>
        </main>
    </div>
</body>
</html>
