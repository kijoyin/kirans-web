apiVersion: v1
kind: Secret
metadata:
  name: blinko-secret
  namespace: blinko-prod
  labels:
    app: blinko
type: Opaque
data:
  # NextAuth secret for authentication - base64 encoded
  # Generate with: openssl rand -base64 32 | base64 -w 0
  # Or PowerShell: [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($(openssl rand -base64 32)))
  # Default: CHANGE_ME_TO_A_RANDOM_SECRET (base64 encoded)
  nextauth-secret: Q0hBTkdFX01FX1RPX0FfUkFORE9NX1NFQ1JFVA==
  
  # PostgreSQL database URL - base64 encoded
  # Format: postgresql://username:password@host:port/database
  # Example: postgresql://blinko:blinko@10.85.89.176:5432/blinko_prod
  # Default: postgresql://blinko:blinko@10.85.89.176:5432/blinko_prod
  database-url: cG9zdGdyZXNxbDovL2JsaW5rbzpibGlua29AMTAuODUuODkuMTc2OjU0MzIvYmxpbmtvX3Byb2Q=
