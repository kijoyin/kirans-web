apiVersion: apps/v1
kind: Deployment
metadata:
  name: blinko
  namespace: blinko-prod
  labels:
    app: blinko
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blinko
  template:
    metadata:
      labels:
        app: blinko
    spec:
      containers:
      - name: blinko
        image: blinkospace/blinko:latest
        ports:
        - containerPort: 1111
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: blinko-secret
              key: nextauth-secret
              optional: true
        - name: NEXTAUTH_URL
          value: "https://notes.objectoverflow.com"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: blinko-secret
              key: database-url
        volumeMounts:
        - name: blinko-data
          mountPath: /app/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
      volumes:
      - name: blinko-data
        persistentVolumeClaim:
          claimName: blinko-prod-pvc
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: blinko-prod-pv
  labels:
    app: blinko
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.1.221
    path: /mnt/Primary/k8s/blinko
  mountOptions:
    - nfsvers=4.1
    - hard
    - noatime
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blinko-prod-pvc
  namespace: blinko-prod
  labels:
    app: blinko
spec:
  storageClassName: ""  # Use static provisioning (manual PV binding)
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: blinko
