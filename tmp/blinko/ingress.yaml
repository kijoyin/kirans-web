apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blinko
  namespace: blinko-prod
  labels:
    app: blinko
  annotations:
    kubernetes.io/ingress.class: "traefik"
spec:
  ingressClassName: traefik
  rules:
  - host: blinko.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: blinko
            port:
              number: 1111
