apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kiranjoy-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/kijoyin/homelabv3"
    targetRevision: main
    path: kiranjoy
  destination:
    server: https://kubernetes.default.svc
    namespace: kiranjoy-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
