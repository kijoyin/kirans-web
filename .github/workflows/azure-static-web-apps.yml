name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  WEBAPP_PROJECT: KiranJoy.Web/KiranJoy.Web.csproj
  OUTPUT_DIR: KiranJoy.Web/output

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # launchSettings.json would force the Development environment,
      # which keeps the app running instead of generating and exiting.
      - name: Remove launchSettings.json
        run: rm -f KiranJoy.Web/Properties/launchSettings.json

      - name: Generate static site
        env:
          ASPNETCORE_ENVIRONMENT: Production
        run: dotnet run --project "$WEBAPP_PROJECT" --configuration Release

      - name: Build search index (Pagefind)
        run: npx -y pagefind --site "$OUTPUT_DIR"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: ${{ env.OUTPUT_DIR }}
          output_location: ""
          skip_app_build: true
          skip_api_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview
    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
